# voice-config.ini
# Piper TTS voice and prosody configuration for podcast audio generation.
#
# This file is loaded automatically by podcasts/tts/generate_episode.py.
# Values here take precedence over the in-code defaults.
# Environment variables take precedence over this file.
# CLI flags (--length-scale, etc.) take precedence over everything.
#
# Load order: code defaults < this file < environment variables < CLI flags
#
# After editing, regenerate audio with:
#   python -m podcasts.tts.generate_episode <slug>
# Or regenerate all episodes:
#   npm run build:podcast-audio

[voice]

# ---------------------------------------------------------------------------
# Voice model selection
# ---------------------------------------------------------------------------
# Filename of the male host (Alex) Piper model.
# Must be present in podcasts/tts/models/.
# Available high-quality options: en_US-ryan-high.onnx, en_US-hfc_male-medium.onnx
# Available medium options:       en_US-ryan-medium.onnx, en_US-lessac-medium.onnx
# Use 'high' models for final production. 'medium' renders faster when iterating.
male_model = en_US-ryan-high.onnx

# Filename of the female host (Jamie) Piper model.
# Must be present in podcasts/tts/models/.
# Available high-quality options: en_US-lessac-high.onnx, en_US-hfc_female-medium.onnx
# Available medium options:       en_US-lessac-medium.onnx, en_US-ryan-medium.onnx
female_model = en_US-lessac-high.onnx

# ---------------------------------------------------------------------------
# Speech speed
# ---------------------------------------------------------------------------
# Controls how long each phoneme is held, effectively slowing or speeding speech.
# Range:   0.7 (fast) to 2.0 (very slow)
# Default: 1.14
#
# Suggested starting points:
#   Fast, energetic delivery:  0.95
#   Natural conversational:    1.05
#   Clear instructor pace:     1.14  <-- current
#   Deliberately slow:         1.25
#   Very slow / emphasis:      1.40
length_scale = 1.15

# ---------------------------------------------------------------------------
# Inflection and expressiveness
# ---------------------------------------------------------------------------
# noise_scale controls how much the model varies pitch and energy across a
# sentence. Lower values produce flatter, more even delivery. Higher values
# produce more expressive, dramatic speech.
# Range:   0.0 (monotone) to 1.2 (highly expressive)
# Default: 0.32
#
# Suggested starting points:
#   Very flat / instructional:  0.20
#   Calm and even:              0.32  <-- current
#   Conversational:             0.50
#   Animated / podcast-style:  0.70
#   High drama:                 0.90
noise_scale = 0.25

# noise_w_scale controls phoneme-level duration variation (how long individual
# sounds are held). Lower values produce more uniform, machine-like timing.
# Higher values produce more natural rhythm with varied syllable lengths.
# Range:   0.0 (uniform duration) to 1.2 (variable duration)
# Default: 0.42
#
# Suggested starting points:
#   Robotic / uniform:          0.20
#   Smooth instructor voice:    0.42  <-- current
#   Natural conversational:     0.60
#   Very natural / spontaneous: 0.80
noise_w_scale = 0.42

# ---------------------------------------------------------------------------
# Pitch shift per voice (requires ffmpeg on PATH)
# ---------------------------------------------------------------------------
# Shifts each speaker pitch after synthesis.
# 0.0 means no shift. Positive values raise pitch, negative lower it.
# Range:   -6.0 (three tones lower) to 6.0 (three tones higher)
# Default: 0.0 for both voices
#
# This uses ffmpeg asetrate/atempo so duration is preserved.
# Requires ffmpeg to be installed and available on PATH.
# Leave at 0.0 to skip this step entirely (faster generation).
#
# Suggested adjustments:
#   Slightly warmer / deeper male voice:   -1.5
#   No change:                              0.0
#   Slightly brighter female voice:        +1.0
male_pitch_semitones = 0.0
female_pitch_semitones = 0.0

# Legacy compatibility key. If present and per-voice values are not set,
# this value is applied to both voices.
pitch_semitones = 0.0

# ---------------------------------------------------------------------------
# Final episode output format
# ---------------------------------------------------------------------------
# Controls the final episode file format written to podcasts/audio/.
# Options:
#   wav   -> writes <slug>.wav
#   mp3   -> writes <slug>.mp3
#   both  -> writes both <slug>.wav and <slug>.mp3
#
# MP3 generation requires ffmpeg on PATH.
episode_audio_format = both

# ---------------------------------------------------------------------------
# Pause timing
# ---------------------------------------------------------------------------
# Duration of silence inserted for each [PAUSE] marker in a script.
# Range:   0.0 to 5.0 seconds
# Default: 1.2
#
# Shorter pauses feel snappier; longer pauses give the listener time to absorb
# a key idea. Use [PAUSE] at section transitions and after important statements.
pause_seconds = 1.3

# ---------------------------------------------------------------------------
# Inter-segment spacing
# ---------------------------------------------------------------------------
# Short silence appended after each spoken segment when the SAME speaker
# continues with the next segment.
# Range:   0.0 to 0.6 seconds
# Default: 0.09
#
# Increase this if same-speaker sentences sound run together.
# Set to 0.0 to disable (not recommended; sounds clipped).
inter_segment_seconds = 0.3

# Silence appended after each spoken segment when the NEXT segment is from a
# DIFFERENT speaker. This gives a natural conversational breath between hosts.
# Range:   0.0 to 0.9 seconds
# Default: 0.16
#
# Increase this if speaker transitions feel abrupt.
# Decrease this if the episode feels too slow to start.
inter_speaker_seconds = 0.45

# ---------------------------------------------------------------------------
# End-of-episode tail silence
# ---------------------------------------------------------------------------
# Extra silence appended to the last spoken segment in the episode.
# Prevents the final word from being cut off at the WAV boundary.
# Range:   0.0 to 1.0 seconds
# Default: 0.12
#
# Increase if the last word of the episode still sounds clipped.
# Values above 0.25 may feel like an intentional fade-out.
final_segment_tail_seconds = 0.25
